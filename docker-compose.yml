services:
  web:
    build:
      context: .
      dockerfile: docker/php71-apache/Dockerfile
    container_name: crm_legacy_web
    ports:
      - "${CRM_WEB_PORT:-8071}:80"
    volumes:
      - ./:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf:ro
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: mysql:5.7
    container_name: crm_legacy_db
    command: --sql-mode="" --character-set-server=utf8 --collation-server=utf8_general_ci
    ports:
      - "${CRM_DB_PORT:-3307}:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: "${CRM_DB_NAME:-db_demopsischv}"
    volumes:
      - crm_mysql_data:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: crm_legacy_phpmyadmin
    ports:
      - "${CRM_PHPMYADMIN_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ""
    depends_on:
      - db
    restart: unless-stopped

volumes:
  crm_mysql_data:
